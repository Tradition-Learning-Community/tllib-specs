- provisional_object_id: TLC-SO-INVARIANTS-005
  object_type: Invariant
  canonical_name: Invariant structural $\mathcal{I}_{\mathrm{struct}}$
  source_name: Invariant structural $\mathcal{I}_{\mathrm{struct}}$
  source_statement: '- **Définition** : organisation topologique du système connaissance‑valeurs‑actions du Maître.

    - **Formalisation** : soit $G=(V,E)$ le graphe dont les sommets représentent les composantes de connaissance, valeurs
    et schémas d’action, et les arêtes les connexions fonctionnelles. L’invariant est le trou spectral du graphe :

    \[

    \mathcal{I}_{\mathrm{struct}} = \lambda_2(L)

    \]

    où $L$ est le laplacien normalisé de $G$ et $\lambda_2$ sa seconde plus petite valeur propre. Pour les Maîtres :

    \[

    \mathcal{I}_{\mathrm{struct}} \ge \gamma > 0

    \]

    - **Interprétation** : un trou spectral positif indique que le système cognitivo‑affectivo‑comportemental est bien connecté
    et robuste. Connaissance, valeurs et actions forment un tout cohérent plutôt que des clusters isolés. Cet invariant sous‑tend
    la capacité du Maître à établir des connexions inattendues et à appliquer des principes à travers les domaines.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant structural $\mathcal{I}_{\mathrm{struct}}$
    » dans la source.
