- provisional_object_id: TLC-SO-INVARIANTS-015
  object_type: Invariant
  canonical_name: Invariant relationnel $\mathcal{I}_{\mathrm{rel,c}}$
  source_name: Invariant relationnel $\mathcal{I}_{\mathrm{rel,c}}$
  source_statement: '- **Définition** : équilibre entre intégration et autonomie dans les réseaux communautaires.

    - **Formalisation** :

    \[

    \mathcal{I}_{\mathrm{rel,c}} = \frac{\lambda_2(L)}{\lambda_n(L)}\cdot\frac{H(\mathcal{A})}{\log|\mathcal{A}|}\cdot(1-\Delta(\mathcal{R}))

    \]

    où les trois facteurs mesurent respectivement la connectivité algébrique, la diversité des rôles et la décentralisation.

    - **Cohésion** : l’intervalle optimal est $\mathcal{I}_{\mathrm{rel,c}} \in [\iota_{\min},\iota_{\max}]$. En dessous de
    $\iota_{\min}$, la communauté se fragmente en sous‑groupes isolés ; au‑dessus de $\iota_{\max}$, elle devient trop centralisée
    et rigide.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant relationnel $\mathcal{I}_{\mathrm{rel,c}}$
