- provisional_object_id: TLC-SO-INVARIANTS-003
  object_type: Invariant
  canonical_name: Invariant éthique $\mathcal{I}_{\mathrm{eth}}$
  source_name: Invariant éthique $\mathcal{I}_{\mathrm{eth}}$
  source_statement: '- **Définition** : mesure la courbure de l’espace des décisions morales autour du Maître.

    - **Formalisation** : soit $M$ la variété des actions possibles dans des situations morales, avec tenseur métrique $g_{ij}$
    dérivé du système de valeurs $\nu$. L’invariant éthique est la courbure scalaire :

    \[

    \mathcal{I}_{\mathrm{eth}} = R = g^{ij}R_{ij}

    \]

    où $R_{ij}$ est le tenseur de Ricci. Pour un Maître authentique, cette courbure reste constante dans un voisinage de ses
    actions caractéristiques :

    \[

    \nabla R = 0 \quad \text{dans } B_{\delta}(\Lambda_{\mathcal{M}})

    \]

    - **Interprétation** : une courbure positive constante indique un univers moral cohérent où les « géodésiques morales »
    convergent vers l’exemplarité du Maître. Une courbure variable ou nulle signale un relativisme ou une éthique situationnelle
    incompatible avec la maîtrise.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant éthique $\mathcal{I}_{\mathrm{eth}}$ »
    dans la source.
