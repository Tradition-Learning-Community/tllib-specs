- provisional_object_id: TLC-SO-INVARIANTS-004
  object_type: Invariant
  canonical_name: Invariant de transmission $\mathcal{I}_{\mathrm{trans}}$
  source_name: Invariant de transmission $\mathcal{I}_{\mathrm{trans}}$
  source_statement: '- **Définition** : efficacité informationnelle du transfert de connaissance du Maître au Disciple.

    - **Formalisation** : soit $I(\mathcal{K}_{\mathcal{M}};\mathcal{K}_{\mathcal{D}})$ l’information mutuelle entre l’état
    de connaissance du Maître et celui du Disciple après un épisode de transmission, et $C(\mathcal{P})$ le coût pédagogique.
    L’invariant est le rapport :

    \[

    \mathcal{I}_{\mathrm{trans}} = \frac{I(\mathcal{K}_{\mathcal{M}};\mathcal{K}_{\mathcal{D}})}{C(\mathcal{P})}

    \]

    Pour un Maître authentique, ce rapport tend vers un maximum théorique :

    \[

    \mathcal{I}_{\mathrm{trans}} \to \frac{H(\mathcal{K})}{C_{\min}}

    \]

    où $H(\mathcal{K})$ est l’entropie du domaine de connaissance et $C_{\min}$ le coût minimal fondamental de transmission.

    - **Interprétation** : les vrais Maîtres atteignent le transfert de connaissance avec une dépense d’énergie pédagogique
    minimale. Un $\mathcal{I}_{\mathrm{trans}}$ faible indique une transmission inefficace ou bruitée.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant de transmission $\mathcal{I}_{\mathrm{trans}}$
    » dans la source.
