- provisional_object_id: TLC-SO-INVARIANTS-013
  object_type: Lemma
  canonical_name: Invariant éthique collectif $\mathcal{I}_{\mathrm{eth,c}}$
  source_name: Invariant éthique collectif $\mathcal{I}_{\mathrm{eth,c}}$
  source_statement: '- **Définition** : mesure la capacité de la communauté à maintenir une cohérence morale face au changement.

    - **Formalisation** :

    \[

    \mathcal{I}_{\mathrm{eth,c}} = \int_{\mathcal{V}_c} R(g)\sqrt{\det g}\,d^n v

    \]

    où $R(g)$ est la courbure scalaire de l’espace des valeurs muni de la métrique $g$. Pour une communauté saine :

    \[

    \frac{d\mathcal{I}_{\mathrm{eth,c}}}{dt} = 0,\quad \nabla\mathcal{I}_{\mathrm{eth,c}} = 0

    \]

    au voisinage des pratiques communautaires fondamentales.

    - **Manifestations** : application cohérente des principes éthiques à travers différents contextes, capacité à résoudre
    les dilemmes moraux par des cadres de raisonnement partagés, maintien de la confiance malgré les désaccords internes.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant éthique collectif $\mathcal{I}_{\mathrm{eth,c}}$
    » dans la source.
