- provisional_object_id: TLC-SO-INVARIANTS-011
  object_type: Invariant
  canonical_name: Conditions de rupture des invariants du Disciple
  source_name: Conditions de rupture des invariants du Disciple
  source_statement: '- **Rupture de la plasticité** : si $\frac{d\mathcal{I}_{\mathrm{plas}}}{dt} > 0$, rigidification ; si
    $<0$, fragmentation cognitive.

    - **Rupture de l’identité** : si $\mathcal{I}_{\mathrm{ident}} \ll 1$, soit dissolution identitaire (premier terme faible),
    soit aliénation (second terme faible).

    - **Rupture de la résonance** : si $\mathcal{I}_{\mathrm{res}}$ change significativement, soit réceptivité trop concentrée
    (apprentissage étroit), soit trop diffuse (incapacité d’engagement profond).'
  concise_description: Objet scientifique explicitement présenté comme « Conditions de rupture des invariants du Disciple
    » dans la source.
