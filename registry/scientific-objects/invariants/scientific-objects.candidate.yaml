- provisional_object_id: TLC-SO-INVARIANTS-008
  object_type: Invariant
  canonical_name: Invariant de plasticité $\mathcal{I}_{\mathrm{plas}}$
  source_name: Invariant de plasticité $\mathcal{I}_{\mathrm{plas}}$
  source_statement: '- **Définition** : mesure la capacité de réorganisation structurelle tout en maintenant la cohérence
    fonctionnelle.

    - **Formalisation** : soit $M$ la variété des états cognitivo‑affectifs possibles avec tenseur métrique $g_{ij}$ dérivé
    de la structure de connaissance $\kappa$. L’invariant est la courbure scalaire totale intégrée sur l’espace d’état accessible
    :

    \[

    \mathcal{I}_{\mathrm{plas}} = \int_M R\sqrt{g}\,d^d x

    \]

    Pour un Disciple sain :

    \[

    \frac{d\mathcal{I}_{\mathrm{plas}}}{dt} = 0

    \]

    - **Interprétation** : une courbure totale constante représente l’équilibre entre flexibilité et stabilité dans l’apprentissage.
    L’augmentation de courbure dans certaines régions (spécialisation) doit être compensée par une diminution ailleurs (maintien
    de la capacité générale), empêchant soit la rigidification soit la flexibilité chaotique.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant de plasticité $\mathcal{I}_{\mathrm{plas}}$
    » dans la source.
