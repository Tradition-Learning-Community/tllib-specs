- provisional_object_id: TLC-SO-INVARIANTS-010
  object_type: Axiom
  canonical_name: Invariant de résonance $\mathcal{I}_{\mathrm{res}}$
  source_name: Invariant de résonance $\mathcal{I}_{\mathrm{res}}$
  source_statement: '- **Définition** : capture la conservation de la capacité réceptive à travers les bandes de fréquence.

    - **Formalisation** : à partir de la décomposition de la réceptivité (axiome 3) :

    \[

    \mathcal{I}_{\mathrm{res}} = \sum_{k=1}^{K} w_k \log w_k + \lambda\left(1 - \sum_{k=1}^{K} w_k\right)

    \]

    où le premier terme est l’entropie négative de la distribution de résonance et le second terme assure la normalisation
    via un multiplicateur de Lagrange $\lambda$. Pour un Disciple s’adaptant de manière optimale :

    \[

    \mathcal{I}_{\mathrm{res}} = \text{constante}

    \]

    - **Interprétation** : cet invariant représente le compromis entre spécialisation et largeur de bande réceptive. À mesure
    que le Disciple se développe, il peut devenir plus réceptif à certains types d’entrée (augmentation de certains $w_k$)
    mais doit diminuer sa réceptivité ailleurs pour maintenir l’équilibre cognitif global.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant de résonance $\mathcal{I}_{\mathrm{res}}$
    » dans la source.
