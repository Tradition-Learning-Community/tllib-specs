- provisional_object_id: TLC-SO-INVARIANTS-009
  object_type: Invariant
  canonical_name: Invariant de conservation de l’identité $\mathcal{I}_{\mathrm{ident}}$
  source_name: Invariant de conservation de l’identité $\mathcal{I}_{\mathrm{ident}}$
  source_statement: '- **Définition** : quantifie la préservation du noyau identitaire essentiel au milieu de la transformation.

    - **Formalisation** : à l’aide du générateur d’identité $\mathcal{G}$ :

    \[

    \mathcal{I}_{\mathrm{ident}} = \frac{\|\mathcal{G}(\mathcal{D}_{\mathrm{base}})\|}{\|\mathcal{D}_{\mathrm{base}}\|} \cdot
    \frac{\langle\mathcal{D}_{\mathrm{base}},\mathcal{D}_{\mathrm{courant}}\rangle}{\|\mathcal{D}_{\mathrm{base}}\|\|\mathcal{D}_{\mathrm{courant}}\|}

    \]

    Le premier terme mesure la préservation de la structure identitaire de base, le second l’alignement entre l’état courant
    et cette base. Sous transformation saine :

    \[

    \mathcal{I}_{\mathrm{ident}} = 1 \quad \forall t

    \]

    - **Interprétation** : cet invariant formalise l’observation psychologique qu’un développement sain maintient les traits
    de personnalité fondamentaux et les valeurs même lorsque les compétences et connaissances s’étendent. Sa violation indique
    une fragmentation identitaire ou une conformité pathologique.'
  concise_description: Objet scientifique explicitement présenté comme « Invariant de conservation de l’identité $\mathcal{I}_{\mathrm{ident}}$
    » dans la source.
