- provisional_object_id: TLC-SO-INVARIANTS-014
  object_type: Invariant
  canonical_name: Invariant de transmission collectif $\mathcal{I}_{\mathrm{trans,c}}$
  source_name: Invariant de transmission collectif $\mathcal{I}_{\mathrm{trans,c}}$
  source_statement: '- **Définition** : efficacité du flux de connaissance à travers les générations.

    - **Formalisation** :

    \[

    \mathcal{I}_{\mathrm{trans,c}} = \frac{I(\mathcal{M}_{\mathrm{source}};\mathcal{M}_{\mathrm{receveur}})}{C(\mathcal{T})}\cdot\frac{T_{\mathrm{génération}}}{T_{\mathrm{transmission}}}

    \]

    où $I$ est l’information mutuelle, $C$ le coût de transmission, et le ratio capture l’efficacité intergénérationnelle.

    - **Continuité** : une communauté saine maintient $\mathcal{I}_{\mathrm{trans,c}} \ge \mathcal{I}_{\min} > 0$ pour tout
    $t$, avec des oscillations bornées autour d’une valeur optimale. Des écarts significatifs indiquent soit une rupture de
    transmission (valeur trop basse), soit une stagnation de l’innovation (valeur trop haute).'
  concise_description: Objet scientifique explicitement présenté comme « Invariant de transmission collectif $\mathcal{I}_{\mathrm{trans,c}}$
