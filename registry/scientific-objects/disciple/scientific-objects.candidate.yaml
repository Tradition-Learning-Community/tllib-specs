- provisional_object_id: TLC-SO-DISCIPLE-015
  object_type: Concept
  canonical_name: Évolution par trajectoire $\mathcal{T}$
  source_name: Évolution par trajectoire $\mathcal{T}$
  source_statement: '\[

    \begin{aligned}

    d\mathcal{P}(t) =&\ \underbrace{\nabla_{\mathcal{P}}U(\mathcal{P},\mathcal{M})}_{\text{potentiel de guidage}}\,dt \\

    &+ \underbrace{\Gamma(\mathcal{P})\circ(\mathcal{M}-\Pi_{\mathcal{M}}(\mathcal{P}))}_{\text{attraction vers le Maître}}\,dt
    \\

    &+ \underbrace{D\Delta_{\mathcal{P}}\mathcal{P}}_{\text{diffusion exploratoire}}\,dt + \underbrace{\sigma_{\mathcal{P}}(\mathcal{P})\,dW_{\mathcal{P}}(t)}_{\text{fluctuations
    aléatoires}}

    \end{aligned}

    \]

    $U$ est un potentiel de guidage, $\Gamma$ un tenseur de couplage adaptatif, $D\Delta_{\mathcal{P}}$ une diffusion, $W_{\mathcal{P}}$
    un bruit blanc cylindrique.'
