  source_statement: '- **Phase de formation** : $\frac{d\mathcal{P}}{dt} = \alpha_{\mathrm{form}}I_{\mathrm{ext}} + \beta_{\mathrm{form}}R(\mathcal{P},\mathcal{P}_{\mathrm{Maître}})
    - \gamma_{\mathrm{form}}\mathcal{P}$.

