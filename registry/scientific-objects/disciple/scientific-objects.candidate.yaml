  object_type: Axiom
  canonical_name: Axiomes de la définition du Disciple
  source_name: Axiomes de la définition du Disciple
  source_statement: '1. **Axiome 1 – Structure de potentiel latent**

    Pour tout Disciple $\mathcal{D}$, il existe une famille dénombrable de sous‑espaces de potentiel latent $\{\mathcal{P}_{\mathrm{latent}}^{(i)}\}_{i=1}^\infty$
    tels que $\mu(\mathcal{P}_{\mathrm{latent}}^{(i)})>0$ et $\mathcal{P}_{\mathrm{latent}}^{(i)}\cap\mathcal{P}_{\mathrm{act}}^{(j)}=\emptyset$
    (potentiel authentiquement nouveau).'
