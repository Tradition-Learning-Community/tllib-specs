    et stratégies d’apprentissage autonomes.

    - **Pic d’apprentissage** : $\frac{d\mathcal{P}}{dt} = \alpha_{\mathrm{peak}}\nabla U$, $\mathcal{R}$ stable, trajectoire
    optimale, spectre à partie réelle négative.

    - **Déclin** : acquisition ralentie, préservation des compétences intégrées, réceptivité stable ou décroissante, identité
    consolidée.

    - **États terminaux** : maîtrise ($\mathcal{D}\to\mathcal{M}$), plateau ($\frac{d\mathcal{P}}{dt}\to0$), régression ($\frac{d\mathcal{P}}{dt}<0$,
