- provisional_object_id: TLC-SO-DISCIPLE-016
  object_type: Concept
  canonical_name: Dynamique de génération d’identité
  source_name: Dynamique de génération d’identité
  source_statement: '\[

    \frac{\partial\mathcal{I}}{\partial t} = \alpha\Delta\mathcal{I} + \beta\mathcal{I}(1-\mathcal{I})(\mathcal{I}-\theta)
    + \gamma(\mathcal{M}_{\mathcal{I}}-\mathcal{I}) + \eta_{\mathcal{I}}(t)

    \]

    - $\alpha\Delta\mathcal{I}$ : diffusion identitaire.

    - $\beta\mathcal{I}(1-\mathcal{I})(\mathcal{I}-\theta)$ : cristallisation (équation de Fisher‑KPP) avec seuil $\theta$.

    - $\gamma(\mathcal{M}_{\mathcal{I}}-\mathcal{I})$ : influence du Maître.'
  concise_description: Objet scientifique explicitement présenté comme « Dynamique de génération d’identité » dans la source.
  source_reference:
