  canonical_name: Le Disciple (Disciple)
  source_name: Le Disciple (Disciple)
  source_statement: 'Dans le cadre de Tradition Learning (TL), le Disciple est l’entité dynamique et évolutive qui subit une
    transformation profonde par l’interaction guidée avec le Maître. Il n’est pas un simple récepteur passif de connaissances,
    mais un système complexe capable de réorganisation et de croissance. Le Disciple incarne ce que les psychologues de l’éducation
    appellent la « zone de développement proximal » : l’espace entre les capacités actuelles et le potentiel réalisable grâce
    à un guidage approprié.'
