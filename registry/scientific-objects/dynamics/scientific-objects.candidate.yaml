  canonical_name: Équations dynamiques (Dynamics)
  source_name: Équations dynamiques (Dynamics)
  source_statement: Les entités fondamentales de Tradition Learning — Maître, Disciple, Communauté — ne sont pas statiques.
    Leur évolution temporelle est régie par des systèmes d’équations différentielles stochastiques (EDS) couplées, qui traduisent
    l’interaction entre processus internes (affinement, maturation) et influences externes (relations, environnement, aléas).
    Ce chapitre rassemble les principales équations dynamiques présentées dans les fichiers précédents, afin d’offrir une
    vision synthétique des mécanismes en jeu.
