  canonical_name: Cycle universel du Message
  source_name: Cycle universel du Message
  source_statement: '- **Existence** : potentiel latent indépendant de l’observateur.

    - **Expression** : émergence à travers les huit discours (visuel, textuel, sonique, structuré, existentiel, énergétique,
    synchronique, ontologique).

    - **Convergence** : intégration des fragments en vision cohérente.

    - **Révélation** : compréhension soudaine (« eureka »).

    - **Transmission** : propagation par enseignement, publication, démonstration.

    - **Transformation du monde** : impact durable sur individus, sociétés, disciplines.'
