- provisional_object_id: TLC-SO-CAPACITIES-003
  object_type: Axiom
  canonical_name: Propriétés essentielles
  source_name: Propriétés essentielles
  source_statement: '- **Latence** : $\mathcal{C}_{\mathrm{latent}}$ a une mesure non nulle dans $\mathcal{C}_p$ (axiome du
    potentiel latent). Les capacités existent indépendamment de leur manifestation et peuvent rester inexploitées.

    - **Activatibilité** : il existe un opérateur d’actualisation $\mathcal{A}$ tel que $\mathcal{A}(\mathcal{C}_{\mathrm{latent}})
    \subset \mathcal{C}_{\mathrm{acquis}}$. Les capacités peuvent être révélées et développées par des conditions externes
    (guidance du Maître, cadre pratique, défis) ou des facteurs internes (motivation, intention, identité).

    - **Structuralité** : les capacités possèdent leur propre architecture interne, façonnée par des facteurs innés et acquis.
    La décomposition orthogonale assure la clarté conceptuelle.

    - **Évolutivité** : la dimension de $\mathcal{C}_{\mathrm{acquis}}$ croît avec le temps sous l’effet de la pratique et
    du guidage. Les capacités ne sont pas fixes ; elles croissent, se diversifient ou s’atrophient avec le temps et l’expérience.

    - **Structure riemannienne** : $\mathcal{C}_p$ est muni d’une métrique riemannienne $g$ qui définit les géodésiques de
    développement, mesurant la « distance » entre différents états potentiels et définissant la trajectoire d’apprentissage
    la plus naturelle.'
  concise_description: Objet scientifique explicitement présenté comme « Propriétés essentielles » dans la source.
