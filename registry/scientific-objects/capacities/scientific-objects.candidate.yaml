- provisional_object_id: TLC-SO-CAPACITIES-005
  object_type: Function
  canonical_name: Domaines de validité
  source_name: Domaines de validité
  source_statement: 'Chaque capacité opère dans des contextes spécifiques :

    \[

    \mathcal{U}_{\mathcal{C}_p} = \{ (d,t,c) \in \mathcal{D} \times \mathbb{R}^+ \times \mathcal{C} \mid \mathcal{R}_{\mathrm{aff}}(d,c)
    > \rho_{\min},\ t > t_{\min},\ \mathcal{E}_{\mathrm{env}} \in \mathcal{E}_{\mathrm{favorable}} \}

    \]

    - $\mathcal{R}_{\mathrm{aff}}$ : fonction d’affinité entre le Disciple et le contexte.

    - $\mathcal{E}_{\mathrm{favorable}}$ : ensemble des environnements propices à l’expression de la capacité.'
