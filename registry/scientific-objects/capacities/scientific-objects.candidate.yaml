- provisional_object_id: TLC-SO-CAPACITIES-014
  object_type: Concept
  canonical_name: Interaction avec les Valeurs et Vertus
  source_name: Interaction avec les Valeurs et Vertus
  source_statement: 'Les Valeurs orientent le développement des capacités, tandis que les Vertus stabilisent leur manifestation
    éthique. L’interaction est capturée par :

    \[

    \frac{d\mathcal{C}_p}{dt} = \alpha (\mathcal{C}_{\mathcal{M}} - \mathcal{C}_p) + \beta \nabla \Phi(\mathcal{F}) + \delta
    \mathcal{V}\cdot\mathcal{C}_p

    \]

    où $\Phi(\mathcal{F})$ représente l’alignement avec les finalités (Valeurs) et $\mathcal{V}$ l’influence des Vertus (Annas,
    2011).'
  concise_description: Objet scientifique explicitement présenté comme « Interaction avec les Valeurs et Vertus » dans la
    source.
