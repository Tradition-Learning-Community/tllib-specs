- provisional_object_id: TLC-SO-CAPACITIES-015
  object_type: Concept
  canonical_name: Évolution dynamique dans le temps
  source_name: Évolution dynamique dans le temps
  source_statement: 'L’évolution des capacités suit une équation différentielle stochastique :

    \[

    \frac{d\mathcal{C}_p}{dt} = \alpha \cdot \mathcal{P}(t) + \beta \cdot \mathcal{T}(t) - \gamma \cdot \mathcal{C}_p + \sigma
    \cdot dW(t)

    \]

    - $\mathcal{P}$ : pratique.

    - $\mathcal{T}$ : efficacité de transmission.

    - $\gamma$ : taux de décroissance.

    - $\sigma dW$ : exploration stochastique (Newell & Simon, 1980).'
  concise_description: Objet scientifique explicitement présenté comme « Évolution dynamique dans le temps » dans la source.
