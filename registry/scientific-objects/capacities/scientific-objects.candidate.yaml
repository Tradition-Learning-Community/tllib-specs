- provisional_object_id: TLC-SO-CAPACITIES-044
  object_type: Theorem
  canonical_name: Théorèmes fondamentaux
  source_name: Théorèmes fondamentaux
  source_statement: '**Théorème 1 (Convergence de l’actualisation)**

    Soit $\{\mathcal{C}_p^{(n)}\}_{n\ge1}$ une séquence de systèmes de capacités sous guidage optimal. Si (1) le Maître $\mathcal{M}$
    est adaptatif, (2) les contextes $\mathcal{X}_n$ convergent vers $\mathcal{X}^*$, et (3) la pratique est suffisante, alors
    :

    \[

    \lim_{n\to\infty} \mathbb{P}\left( \frac{\mu(\mathcal{C}_{a,n})}{\mu(\mathcal{C}_{p,n})} \cdot \Gamma(\mathcal{X}_n) >
    1 - \epsilon \right) = 1

    \]

    où $\Gamma(\mathcal{X})$ est l’adéquation contextuelle.'
  concise_description: Objet scientifique explicitement présenté comme « Théorèmes fondamentaux » dans la source.
