- provisional_object_id: TLC-SO-COMMUNITY-015
  object_type: State
  canonical_name: Cycle de vie de la Communauté
  source_name: Cycle de vie de la Communauté
  source_statement: '- **Phase de fondation** : croissance rapide par attractivité charismatique, cohérence des valeurs élevée,
    réseau en étoile centré sur le fondateur.

    - **Phase de consolidation** : transition vers l’autorité traditionnelle/rationale, développement des rôles formels, mémoire
    collective s’étoffe.

    - **Maturité** : $\frac{d\mathcal{A}}{dt}\approx0$, $\frac{d\mathcal{R}}{dt}\approx0$, $\frac{d\mathcal{V}_c}{dt}$ bornée,
    $\frac{d\mathcal{N}}{dt}>0$ – robustesse, équilibre entre stabilité et adaptabilité.

    - **Transformation ou déclin** : bifurcation selon la capacité d’adaptation $\kappa(\mathcal{C})$.

    - **États dégénérés** : fragmentation (multiples factions sans récit commun), dogmatisation (fermeture), perte de transmission
    ($\mathcal{I}_{\mathrm{trans}}\to0$).'
  concise_description: Objet scientifique explicitement présenté comme « Cycle de vie de la Communauté » dans la source.
