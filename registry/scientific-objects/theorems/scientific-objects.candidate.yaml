- provisional_object_id: TLC-SO-THEOREMS-003
  object_type: Theorem
  canonical_name: Émergence collective
  source_name: Émergence collective
  source_statement: '**Théorème (Émergence collective)**

    Pour tout $\epsilon>0$, il existe une taille critique de communauté $N_0(\epsilon)$ et un seuil de connectivité $\lambda_{\mathrm{crit}}(\epsilon)$
    tels que pour toute communauté $\mathcal{C}$ avec $|\mathcal{A}|>N_0$ et $\lambda_2(L(\mathcal{R}))>\lambda_{\mathrm{crit}}$,
    la probabilité d’émergence collective vérifie :

    \[

    \mathbb{P}\big(\|\mathcal{G}(\mathcal{C})-\mathbb{E}[\mathcal{G}(\mathcal{C})]\|<\epsilon\big) > 1-\epsilon,

    \]

    où l’émergence collective est définie par $\mathcal{G}(\mathcal{C})\neq\bigoplus_{a\in\mathcal{A}}\mathcal{G}(a)$ (l’identité
    collective n’est pas réductible à la somme des identités individuelles). De plus, l’émergence se produit exponentiellement
    vite.'
  concise_description: Objet scientifique explicitement présenté comme « Émergence collective » dans la source.
  source_reference:
    repository: Tradition-Learning-Community/tllib-specs
