- provisional_object_id: TLC-SO-THEOREMS-009
  object_type: Theorem
  canonical_name: Propagation d’onde dans l’identité
  source_name: Propagation d’onde dans l’identité
  source_statement: '**Théorème (Propagation d’onde identitaire)**

    L’équation de génération d’identité

    \[

    \frac{\partial\mathcal{I}}{\partial t} = \alpha\Delta\mathcal{I} + \beta\mathcal{I}(1-\mathcal{I})(\mathcal{I}-\theta)

    \]

    admet des solutions en forme d’onde progressive $\mathcal{I}(x,t)=\phi(x-ct)$ avec une vitesse

    \[

    c = c(\alpha,\beta,\theta) = \sqrt{2\alpha\beta\left(\frac12-\theta\right)}.

    \]'
  concise_description: Objet scientifique explicitement présenté comme « Propagation d’onde dans l’identité » dans la source.
