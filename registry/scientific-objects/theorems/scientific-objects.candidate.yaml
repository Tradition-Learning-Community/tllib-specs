- provisional_object_id: TLC-SO-THEOREMS-010
  object_type: Theorem
  canonical_name: Bifurcation de la réceptivité
  source_name: Bifurcation de la réceptivité
  source_statement: '**Théorème (Bifurcation de la réceptivité)**

    Il existe une valeur critique $\beta_c$ telle que pour $\beta>\beta_c$, le système de réceptivité

    \[

    \frac{d\mathcal{R}_k}{dt} = r_k\mathcal{R}_k\Big(1-\frac{\mathcal{R}_k}{K_k}\Big) - \sum_{j\neq k}\alpha_{kj}\mathcal{R}_k\mathcal{R}_j
    + \beta_k\mathcal{F}_k(\mathcal{M},\mathcal{D})

    \]

    subit une bifurcation fourche, créant plusieurs profils de réceptivité stables. Ceci explique pourquoi différents Disciples
    peuvent développer des styles d’apprentissage distincts sous le même Maître.'
  concise_description: Objet scientifique explicitement présenté comme « Bifurcation de la réceptivité » dans la source.
