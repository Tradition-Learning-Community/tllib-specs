  object_type: Concept
  canonical_name: Stabilité
  source_name: Stabilité
  source_statement: 'Un Principe est **stable** si son effet est cohérent sur son domaine :

    \[

    \forall D_1,D_2\in D_P,\ D_1\sim D_2 \Longrightarrow M_1\sim M_2

    \]

    où $\sim$ désigne la similarité sémantique ou structurelle, et $D_i \succ_P M_i$.'
