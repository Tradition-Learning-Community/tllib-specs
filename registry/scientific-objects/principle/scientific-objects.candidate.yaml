- provisional_object_id: TLC-SO-PRINCIPLE-008
  object_type: Set
  canonical_name: Génétativité
  source_name: Génétativité
  source_statement: 'Un Principe $P$ est **génératif** si sa relation de guidage peut produire des Messages nouveaux non présents
    dans les discours d’entraînement. Si $S \subset D_P$ est un ensemble de discours sources, l’ensemble

    \[

    \langle S \rangle_P = \{ M \mid \exists D\in D_P,\ D \succ_P M \}

    \]

    n’est pas contenu dans les Messages dérivés de $S$ sans $P$.'
  concise_description: Objet scientifique explicitement présenté comme « Génétativité » dans la source.
