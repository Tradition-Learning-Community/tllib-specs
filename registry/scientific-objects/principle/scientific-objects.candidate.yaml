- provisional_object_id: TLC-SO-PRINCIPLE-016
  object_type: Concept
  canonical_name: Modes de transmission
  source_name: Modes de transmission
  source_statement: '- **Explicite** : énoncé direct (aphorismes, règles, formules).

    - **Implicite** : émerge par la pratique, le modelage, l’immersion (Lave & Wenger, 1991).

    - **Progressif** : dévoilé par étapes, avec des formulations simplifiées d’abord.

    - **Initiatique** : révélé dans un contexte structuré où l’apprenant est préparé.

    - **Insight soudain** : après une longue maturation, la compréhension advient brusquement.'
  concise_description: Objet scientifique explicitement présenté comme « Modes de transmission » dans la source.
