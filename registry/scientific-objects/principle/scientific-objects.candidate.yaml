- provisional_object_id: TLC-SO-PRINCIPLE-006
  object_type: Example
  canonical_name: Exemples d’instanciation
  source_name: Exemples d’instanciation
  source_statement: '- **Vectoriel** : $F_P \in \mathbb{R}^d$, $\succ_P$ implémenté par similarité ou transformation dans
    un espace d’embedding.

    - **Logique** : $F_P$ est une formule, $\succ_P$ est la déduction logique.

    - **Opérationnel** : $F_P$ est une fonction $f_P$, et $D \succ_P M$ signifie $M = f_P(D)$.

    - **Catégoriel** : $F_P$ est un objet d’une catégorie, $\succ_P$ un morphisme.'
