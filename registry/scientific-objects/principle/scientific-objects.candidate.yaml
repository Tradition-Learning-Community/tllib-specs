- provisional_object_id: TLC-SO-PRINCIPLE-005
  object_type: Function
  canonical_name: Niveaux de formalisation
  source_name: Niveaux de formalisation
  source_statement: '- **Niveau 1 – Abstrait‑relationnel** : $F_P$ reste un symbole non interprété, $\succ_P$ est une relation
    abstraite. Utile pour l’analyse philosophique (propriétés logiques : réflexivité, transitivité, composition).

    - **Niveau 2 – Ensembliste** : $F_P$ est défini comme un ensemble de contraintes, de règles ou de motifs autorisés. La
    relation est modélisée par une prédicat $\Phi_P(D,M)$ :

    \[

    D \succ_P M \iff M \in \{ M'' \mid \Phi_P(D,M'') \}.

    \]

    - **Niveau 3 – Calculable** : $F_P$ est un objet calculable (vecteur, couche de réseau de neurones, programme symbolique).
    $\succ_P$ devient une fonction ou une application stochastique, implémentable en IA.'
  concise_description: Objet scientifique explicitement présenté comme « Niveaux de formalisation » dans la source.
