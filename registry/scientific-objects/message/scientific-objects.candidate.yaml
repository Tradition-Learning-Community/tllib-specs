- provisional_object_id: TLC-SO-MESSAGE-005
  object_type: Concept
  canonical_name: Conditions d’existence
  source_name: Conditions d’existence
  source_statement: '1. **Agent intentionnel** (Maître) : encode la connaissance sous une forme transmissible (souvent partiellement
    tacite, Polanyi, 1966).

    2. **Agent réceptif** (Disciple) : prêt à percevoir, interpréter et intégrer (Vygotsky, 1978).

    3. **Médium** : support de transmission (oral, écrit, démonstration, rituel, numérique).'
  concise_description: Objet scientifique explicitement présenté comme « Conditions d’existence » dans la source.
