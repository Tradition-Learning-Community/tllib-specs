- provisional_object_id: TLC-SO-MESSAGE-004
  object_type: Concept
  canonical_name: Propriétés essentielles
  source_name: Propriétés essentielles
  source_statement: '- **Transmissibilité** : capacité à être transmis à travers le temps et les cultures, non comme copie
    mécanique mais comme potentiel de réorganisation. La résistance rencontrée (paradigmatique, culturelle) n’est pas un échec
    mais le signe que le Message opère à un niveau fondamental.

    - **Intégrativité** : combine instructions procédurales et principes conceptuels, favorisant à la fois l’action immédiate
    et la compréhension à long terme.

    - **Impact transformateur** : remodèle les cadres cognitifs, éthiques et perceptuels du Disciple (Bruner, 1960).

    - **Profondeur symbolique** : sens multiples accessibles par compétence culturelle.

    - **Dépendance contextuelle** : la signification émerge de l’interaction entre culture, connaissances antérieures et situation.'
  concise_description: Objet scientifique explicitement présenté comme « Propriétés essentielles » dans la source.
