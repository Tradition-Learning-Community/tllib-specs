- provisional_object_id: TLC-SO-VIRTUES-013
  object_type: Relation
  canonical_name: Vertus situationnelles ou contextuelles
  source_name: Vertus situationnelles ou contextuelles
  source_statement: '- **Courage adaptatif** : prise de risque appropriée au contexte. Courage calibré aux circonstances spécifiques
    (Dreyfus & Dreyfus, 1986).

    - **Compassion proportionnée** : soin ajusté à la situation. Compassion modulée par le contexte et le besoin (Nussbaum,
    1988).

    - **Patience stratégique** : endurance consciente du moment opportun. Patience qui discerne quand agir et quand attendre.

    - **Honnêteté contextuelle** : vérité avec discernement. Honnêteté tempérée par la considération des conséquences et des
    relations.'
  concise_description: Objet scientifique explicitement présenté comme « Vertus situationnelles ou contextuelles » dans la
