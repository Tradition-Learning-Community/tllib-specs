- provisional_object_id: TLC-SO-VIRTUES-003
  object_type: Metric
  canonical_name: Propriétés essentielles
  source_name: Propriétés essentielles
  source_statement: '- **Stabilité** : résistance aux perturbations contextuelles et à l’érosion temporelle. Une fois cultivées,
    les vertus deviennent des patterns de réponse fiables qui persistent à travers les situations (Dreyfus & Dreyfus, 1986).

    - **Développabilité** : capacité à être cultivées par la pratique délibérée. Les vertus ne sont pas innées mais acquises
    par un entraînement systématique (Aristote, 2009 ; Annas, 2011).

    - **Flexibilité contextuelle** : application adaptative tout en préservant l’identité fondamentale. La même vertu se manifeste
    différemment selon les contextes sans perdre sa nature essentielle (Nussbaum, 1988).

    - **Intégration** : cohérence avec les autres vertus et les composantes du système. Les vertus forment un réseau interconnecté
    plutôt que des traits isolés (MacIntyre, 1984).

    - **Mesurabilité** : existence d’indicateurs observables et de métriques de progression. Le développement des vertus peut
    être évalué à travers le comportement, le jugement et la constance de l’action (Annas, 2011).'
  concise_description: Objet scientifique explicitement présenté comme « Propriétés essentielles » dans la source.
