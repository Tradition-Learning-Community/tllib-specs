  object_type: Concept
  canonical_name: Vertus (Virtues)
  source_name: Vertus (Virtues)
  source_statement: 'Dans le cadre de Tradition Learning (TL), les **Vertus** représentent le sommet de l’évolution personnelle.
    Si les Valeurs sont des idéaux vers lesquels on tend, des orientations morales guidant l’action, les Vertus sont l’aboutissement
    de ce cheminement : ce sont les valeurs devenues seconde nature, des dispositions stables et durables, incarnées si profondément
    qu’elles s’expriment sans effort, spontanément, dans chaque geste et chaque décision.'
  concise_description: Objet scientifique explicitement présenté comme « Vertus (Virtues) » dans la source.
