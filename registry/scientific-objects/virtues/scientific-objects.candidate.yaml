- provisional_object_id: TLC-SO-VIRTUES-008
  object_type: Concept
  canonical_name: Taxonomie des vices
  source_name: Taxonomie des vices
  source_statement: '- **Vices moraux** : lâcheté, intempérance, injustice, cruauté, malhonnêteté.

    - **Vices intellectuels** : témérité, fermeture d’esprit, orgueil intellectuel, ignorance volontaire (Zagzebski, 1996).

    - **Vices sociaux** : paresse, irresponsabilité, individualisme, arrogance (MacIntyre, 1984).

    - **Vices contextuels** : expressions vertueuses inappropriées (compassion sans discernement, courage sans prudence).'
  concise_description: Objet scientifique explicitement présenté comme « Taxonomie des vices » dans la source.
