- provisional_object_id: TLC-SO-VIRTUES-006
  object_type: Concept
  canonical_name: Structure triadique
  source_name: Structure triadique
  source_statement: 'Chaque vertu est positionnée entre deux vices opposés :

    - **Vice par défaut** : manque de la qualité vertueuse (ex. lâcheté comme défaut de courage).

    - **Vice par excès** : surabondance ou distorsion de la qualité (ex. témérité comme excès de courage).'
  concise_description: Objet scientifique explicitement présenté comme « Structure triadique » dans la source.
