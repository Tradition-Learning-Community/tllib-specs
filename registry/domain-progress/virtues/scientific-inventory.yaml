  explicit_definition: '- **Vices moraux** : lâcheté, intempérance, injustice, cruauté, malhonnêteté.

    - **Vices intellectuels** : témérité, fermeture d’esprit, orgueil intellectuel, ignorance volontaire (Zagzebski,
