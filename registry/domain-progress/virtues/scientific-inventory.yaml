  source_reference: *id012
  explicit_definition: '- **Diligence** : effort constant et persévérance. Application régulière aux tâches et responsabilités
    (Weber, 2005).

    - **Responsabilité** : gestion fiable des devoirs. Accomplissement régulier des obligations (MacIntyre, 1984).

    - **Coopération** : engagement collaboratif avec autrui. Participation efficace aux entreprises collectives
    (Putnam, 2000).

    - **Leadership** : guidance qui responsabilise les autres. Direction tout en permettant l’autonomie (Burns,
    1978).

    - **Service** : contribution au bien-être de la communauté. Orientation vers le bien commun (Greenleaf, 1977).'
