  explicit_definition: '- **Courage adaptatif** : prise de risque appropriée au contexte. Courage calibré aux circonstances
    spécifiques (Dreyfus & Dreyfus, 1986).

    - **Compassion proportionnée** : soin ajusté à la situation. Compassion modulée par le contexte et le besoin
    (Nussbaum, 1988).

    - **Patience stratégique** : endurance consciente du moment opportun. Patience qui discerne quand agir et quand
    attendre.

    - **Honnêteté contextuelle** : vérité avec discernement. Honnêteté tempérée par la considération des conséquences
    et des relations.'
