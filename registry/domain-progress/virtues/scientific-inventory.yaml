    start_line: 64
    end_line: 69
  source_reference: *id011
  explicit_definition: '- **Sagesse** : discernement dans l’application de la connaissance. Intégration de la compréhension
    avec le bon jugement (Aristote, 2009).

    - **Curiosité** : poursuite équilibrée de la compréhension. Désir de savoir, régulé de manière appropriée (Zagzebski,
    1996).

    - **Prudence** : jugement pratique dans la prise de décision. Capacité à délibérer correctement sur ce qui est
    bon (Aristote, 2009).

    - **Humilité intellectuelle** : reconnaissance des limites cognitives. Conscience de la faillibilité de sa connaissance
    (Roberts & Wood, 2007).

    - **Ouverture d’esprit** : entre crédulité et scepticisme. Volonté de considérer des perspectives alternatives
    (Baehr, 2011).'
