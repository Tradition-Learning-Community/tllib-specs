    start_line: 57
    end_line: 62
  source_reference: *id010
  explicit_definition: '- **Courage** : entre lâcheté et témérité. Disposition à affronter la peur de manière appropriée
    pour des fins valables (Aristote, 2009).

    - **Tempérance** : entre insensibilité et débauche. Modération dans les plaisirs et désirs (Platon, 1992).

    - **Justice** : entre égoïsme et abnégation. Donner à chacun son dû (Aristote, 2009 ; Rawls, 1971).

    - **Compassion** : entre indifférence et sentimentalisme. Réponse appropriée à la souffrance d’autrui (Nussbaum,
    1988).

    - **Honnêteté** : entre tromperie et franchise brutale. Véracité dans la parole et l’action (Williams, 2002).'
