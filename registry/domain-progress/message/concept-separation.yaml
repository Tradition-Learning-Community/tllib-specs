domain: message
preparation_only: true
canonical_baseline: origin/main
authority_rule: canonical_only
separations:
- left: Message
  right: Information
  status: provisional
  rule: not interchangeable without canonical proof
- left: Message
  right: Communication
  status: provisional
  rule: message is not the communication process
- left: Message
