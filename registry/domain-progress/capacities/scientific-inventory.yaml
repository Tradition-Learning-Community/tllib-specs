    start_line: 253
    end_line: 260
  source_statement: '**Théorème 1 (Convergence de l’actualisation)**

    Soit $\{\mathcal{C}_p^{(n)}\}_{n\ge1}$ une séquence de systèmes de capacités sous guidage optimal. Si (1) le
    Maître $\mathcal{M}$ est adaptatif, (2) les contextes $\mathcal{X}_n$ convergent vers $\mathcal{X}^*$, et (3)
    la pratique est suffisante, alors :

    \[

    \lim_{n\to\infty} \mathbb{P}\left( \frac{\mu(\mathcal{C}_{a,n})}{\mu(\mathcal{C}_{p,n})} \cdot \Gamma(\mathcal{X}_n)
    > 1 - \epsilon \right) = 1

    \]

    où $\Gamma(\mathcal{X})$ est l’adéquation contextuelle.'
  symbols:
  - \{\mathcal{C}_p^{(n)}\}_{n\ge1}
  - \mathcal{M}
  - \mathcal{X}_n
  - \mathcal{X}^*
  - \Gamma(\mathcal{X})
  - \mathcal
  - \mathbb
  - \mu(\mathcal{C}_{a,n})
  - \mu(\mathcal{C}_{p,n})
  - \epsilon
  status: candidate
  issues: []
  non_invention_note: Canonical extraction retained; no ambiguity resolved.
