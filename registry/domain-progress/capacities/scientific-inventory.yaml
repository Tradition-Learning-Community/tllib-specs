  source_statement: 'Le Maître fournit un guidage structuré, adaptant les défis à la capacité actuelle du Disciple.
    Cela suit le principe de la zone de développement proximal (Vygotsky, 1978) :

    \[

    \mathcal{C}_{\mathrm{potentiel}} = \mathcal{C}_{\mathrm{courant}} + \mathrm{ZPD}(\mathcal{M},\mathcal{D})

    \]'
