    section: Potentiel et capacités latentes
    subsection: Évolution dynamique dans le temps
    start_line: 91
    end_line: 99
  source_statement: 'L’évolution des capacités suit une équation différentielle stochastique :

    \[

    \frac{d\mathcal{C}_p}{dt} = \alpha \cdot \mathcal{P}(t) + \beta \cdot \mathcal{T}(t) - \gamma \cdot \mathcal{C}_p
    + \sigma \cdot dW(t)

    \]

    - $\mathcal{P}$ : pratique.

    - $\mathcal{T}$ : efficacité de transmission.

    - $\gamma$ : taux de décroissance.

    - $\sigma dW$ : exploration stochastique (Newell & Simon, 1980).'
