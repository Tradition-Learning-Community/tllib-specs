  source_statement: Dans le cadre de Tradition Learning (TL), les **Capacités** représentent le potentiel dynamique
    d’un agent (individuel ou collectif) à mobiliser des ressources cognitives, affectives, corporelles et métacognitives
    pour effectuer une action ou générer une compétence dans un contexte donné. Elles constituent la matière première
    latente du Disciple, la force inexprimée qui, sous l’effet combiné de l’exemplarité du Maître, de la pratique
    et de la validation communautaire, se transforme en action efficace et en sagesse active.
  symbols: []
