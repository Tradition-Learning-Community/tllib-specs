  source_statement: 'Toute capacité a des limites opérationnelles définies par :

    - **Limites de charge cognitive** : complexité maximale gérable (Sweller, 1988).

    - **Contraintes énergétiques** : ressources finies pour une activation soutenue.

    - **Plafonds développementaux** : bornes supérieures déterminées par des facteurs innés et la qualité de la
    pratique.'
