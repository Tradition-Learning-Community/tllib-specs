    subsection: Interaction avec les Valeurs et Vertus
    start_line: 84
    end_line: 89
  source_statement: 'Les Valeurs orientent le développement des capacités, tandis que les Vertus stabilisent leur
    manifestation éthique. L’interaction est capturée par :

    \[

    \frac{d\mathcal{C}_p}{dt} = \alpha (\mathcal{C}_{\mathcal{M}} - \mathcal{C}_p) + \beta \nabla \Phi(\mathcal{F})
    + \delta \mathcal{V}\cdot\mathcal{C}_p

    \]

    où $\Phi(\mathcal{F})$ représente l’alignement avec les finalités (Valeurs) et $\mathcal{V}$ l’influence des
    Vertus (Annas, 2011).'
