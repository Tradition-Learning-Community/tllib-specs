  source_evidence:
  - 'Dans le cadre de Tradition Learning (TL), le Disciple est l’entité dynamique et évolutive qui subit une transformation
    profonde par l’interaction guidée avec le Maître. Il n’est pas un simple récepteur passif de connaissances,
    mais un système complexe capable de réorganisation et de croissance. Le Disciple incarne ce que les psychologues
    de l’éducation appellent la « zone de développement proximal » : l’espace entre les capacités actuelles et le
    potentiel réalisable grâce à un guidage approprié.'
  - '\[

    \frac{\partial\mathcal{I}}{\partial t} = \alpha\Delta\mathcal{I} + \beta\mathcal{I}(1-\mathcal{I})(\mathcal{I}-\theta)
    + \gamma(\mathcal{M}_{\mathcal{I}}-\mathcal{I}) + \eta_{\mathcal{I}}(t)

    \]

    - $\alpha\Delta\mathcal{I}$ : diffusion identitaire.

    - $\beta\mathcal{I}(1-\mathcal{I})(\mathcal{I}-\theta)$ : cristallisation (équation de Fisher‑KPP) avec seuil
    $\theta$.

    - $\gamma(\mathcal{M}_{\mathcal{I}}-\mathcal{I})$ : influence du Maître.'
  - '\[

    \frac{d\mathcal{R}_k}{dt} = r_k\mathcal{R}_k\left(1-\frac{\mathcal{R}_k}{K_k}\right) - \sum_{j\neq k}\alpha_{kj}\mathcal{R}_k\mathcal{R}_j
    + \beta_k\mathcal{F}_k(\mathcal{M},\mathcal{D}) + \xi_k(t)

    \]

    Compétition de type Lotka‑Volterra entre les bandes de réceptivité, avec modulation par le Maître.'
  - '- **Phase de formation** : $\frac{d\mathcal{P}}{dt} = \alpha_{\mathrm{form}}I_{\mathrm{ext}} + \beta_{\mathrm{form}}R(\mathcal{P},\mathcal{P}_{\mathrm{Maître}})
    - \gamma_{\mathrm{form}}\mathcal{P}$.

    - **Émergence de compétence** : $\dim(\mathcal{P}_{\mathrm{actualisé}}) > \frac12\dim(\mathcal{P}_{\mathrm{Maître}})$
    et stratégies d’apprentissage autonomes.

    - **Pic d’apprentissage** : $\frac{d\mathcal{P}}{dt} = \alpha_{\mathrm{peak}}\nabla U$, $\mathcal{R}$ stable,
    trajectoire optimale, spectre à partie réelle négative.

    - **Déclin** : acquisition ralentie, préservation des compétences intégrées, réceptivité stable ou décroissante,
    identité consolidée.

    - **États terminaux** : maîtrise ($\mathcal{D}\to\mathcal{M}$), plateau ($\frac{d\mathcal{P}}{dt}\to0$), régression
    ($\frac{d\mathcal{P}}{dt}<0$, fragmentation identitaire).'
  - 'Le Disciple se distingue de l’expert et du Maître : il est orienté vers l’apprentissage, non vers la performance
    ou l’enseignement. Son rôle est de recevoir et d’incarner la tradition, avec une plasticité élevée. Il est le
    substrat dynamique sur lequel le Maître agit, et c’est par sa transformation que la tradition se perpétue.'
  - '- **Apprenti** : équilibre potentiel/compétences, réceptivité focalisée, début de convergence vers le Maître.'
  - '- **Fidèle dévoué** : connaissance strictement bornée par le Maître, imitatif, identité alignée.'
  - '- **Phase de formation** : $\frac{d\mathcal{P}}{dt} = \alpha_{\mathrm{form}}I_{\mathrm{ext}} + \beta_{\mathrm{form}}R(\mathcal{P},\mathcal{P}_{\mathrm{Maître}})
    - \gamma_{\mathrm{form}}\mathcal{P}$.'
  - '- **Émergence de compétence** : $\dim(\mathcal{P}_{\mathrm{actualisé}}) > \frac12\dim(\mathcal{P}_{\mathrm{Maître}})$
    et stratégies d’apprentissage autonomes.'
