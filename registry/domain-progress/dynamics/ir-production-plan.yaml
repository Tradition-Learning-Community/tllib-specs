  - {<<: *ir_defaults, feature_id: TLC-FC-05-DYNAMICS-004, planned_contract_dependency: validated_transformation_contract, planned_ir_kind: functional, planned_nodes_or_elements: [integral_operator, kernel_function, input, output], planned_functions: [F, K], planned_equations: [integral_feedback, multi_exponential_kernel], disciple_dependencies: [symbol_available], ir_generation_gate: contract_validated, notes: "Convergence and domains stay unresolved until contracted."}
