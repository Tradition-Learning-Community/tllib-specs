  - {<<: *ir_defaults, feature_id: TLC-FC-05-DYNAMICS-006, planned_contract_dependency: validated_structural_contract, planned_ir_kind: structural, planned_nodes_or_elements: [entity, opaque_state_candidate, relation], planned_states: state_candidates_only, planned_external_symbols: [master, disciple, community], master_dependencies: [symbol_available], disciple_dependencies: [symbol_available], community_dependencies: [future_symbol_reconciliation], ir_generation_gate: contract_validated, notes: "No state space or transition invented."}
  - {<<: *ir_defaults, feature_id: TLC-FC-05-DYNAMICS-007, planned_contract_dependency: scientific_decision_then_validated_contract, planned_ir_kind: not_yet_determinable, planned_nodes_or_elements: not_yet_determinable, planned_states: unresolved, master_dependencies: [symbol_available], disciple_dependencies: [symbol_available], ir_generation_gate: local_scientific_decision_required, structural_ir_possible: false, notes: "State/evolution boundary unresolved."}
