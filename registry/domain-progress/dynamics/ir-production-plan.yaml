  planned_transitions: []
  planned_time_representation: opaque_time_symbol
  planned_functions: not_yet_determinable
  planned_operators: not_yet_determinable
  planned_equations: []
  planned_constraints: []
  planned_invariants: []
  planned_external_symbols: []
