  source_statement: 'Les valeurs s’adaptent par évolution de leur orientation $\mathcal{O}$
    et de leur hiérarchie $\mathcal{H}$ :

    \[

    \frac{d\mathcal{O}}{dt} = \gamma_{\mathcal{O}}(\mathcal{O}_{\mathrm{maître}} -
    \mathcal{O}) + \sigma_{\mathcal{O}}\dot{W}_{\mathcal{O}}

    \]

