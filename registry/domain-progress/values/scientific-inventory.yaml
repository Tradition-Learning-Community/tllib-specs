  canonical_name: Valeurs (Values)
  source_name: Valeurs (Values)
  source_statement: Dans le cadre de Tradition Learning (TL), les **Valeurs** constituent
    l’orientation axiologique fondamentale qui guide l’évaluation, la priorisation
    et l’action au sein d’une tradition. Elles ne sont pas de simples préférences
    subjectives, mais des critères profonds du désirable, des principes hiérarchiques
    et des éléments structurants de l’identité personnelle et collective. Alors que
    les Principes sont des lois abstraites, les Valeurs sont des qualités humaines
    incarnées qui donnent sens et direction à la pratique.
  concise_description: Objet scientifique explicitement présenté comme « Valeurs (Values)
