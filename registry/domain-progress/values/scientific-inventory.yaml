- provisional_object_id: TLC-SO-VALUES-005
  object_type: State
  canonical_name: Domaines de validité
  source_name: Domaines de validité
  source_statement: 'Chaque valeur opère dans des contextes spécifiques :

    \[

    \mathcal{U}_{Val} = \{(s,d,c,t,e) \in \mathcal{S}_{\mathrm{sit}} \times \mathcal{D}_{\mathrm{dec}}
    \times \mathcal{C}_{\mathrm{cut}} \times \mathbb{R}^+ \times \mathcal{E}_{\mathrm{emot}}
    \mid s \in \mathcal{S}_{\mathrm{axio}}, d \in \mathcal{D}_{\mathrm{adm}}, c \in
    \mathcal{C}_{\mathrm{comp}}, t > t_{\min}, e \in \mathcal{E}_{\mathrm{coh}} \}

    \]

    - $\mathcal{S}_{\mathrm{axio}}$ : situations moralement pertinentes.

    - $\mathcal{D}_{\mathrm{adm}}$ : décisions admissibles.

    - $\mathcal{C}_{\mathrm{comp}}$ : contextes culturels compatibles.

    - $\mathcal{E}_{\mathrm{coh}}$ : états émotionnels cohérents.'
  concise_description: Objet scientifique explicitement présenté comme « Domaines
    de validité » dans la source.
