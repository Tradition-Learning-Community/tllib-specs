  object_type: Theorem
  canonical_name: Théorèmes fondamentaux
  source_name: Théorèmes fondamentaux
  source_statement: '**Théorème 1 (Stabilité axiologique)**

    Soit $\{Val_n\}$ une séquence de valeurs sous l’influence d’un Maître $\mathcal{M}$
    et d’une communauté $\mathcal{C}$. Si (1) $\mathcal{M}$ satisfait l’exemplarité
    axiologique, (2) $\mathcal{T}$ est ergodique et préserve la topologie axiologique,
    (3) les hiérarchies $\mathcal{H}_n$ sont uniformément bornées et métastables,
    et (4) la cohésion communautaire $\mathcal{C}_{\mathrm{coh}} > \theta_{\mathrm{support}}$,
    alors il existe une valeur limite stable $Val_\infty$ avec convergence presque
    sûre et préservation de la structure axiologique.'
