  object_type: Metric
  canonical_name: Espaces et structures
  source_name: Espaces et structures
  source_statement: '- $\mathcal{P}$ : espace de Banach séparable (ex. $\ell^2(\mathbb{N})$),
    avec norme $\|\cdot\|_{\mathcal{P}}$.

    - $\mathcal{O} \subset \mathbb{S}^{n-1}$ (sphère unité dans $\mathbb{R}^n$), avec
    distance géodésique.

    - $\mathcal{H}$ : ensemble des ordres partiels sur un ensemble fini de valeurs,
    avec topologie d’ordre.

    - $\mathcal{W}$ : ensemble des fonctions mesurables $\mathcal{C} \times \mathbb{R}^+
    \to [0,1]$, norme $L^\infty$.

    - $\mathcal{I} = [0,1]$ avec métrique usuelle.

    - $\mathcal{C}$ : espace des matrices symétriques réelles $m\times m$ à coefficients
    dans $[-1,1]$, norme spectrale.'
