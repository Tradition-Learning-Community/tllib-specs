    \frac{d\mathcal{H}}{dt} = -\nabla_{\mathcal{H}}\Phi_{\mathrm{coh}} + \eta_{\mathcal{H}}(t)

    \]

    où $\Phi_{\mathrm{coh}}$ est un potentiel de cohérence.'
