  source_name: Impact sur la dynamique de groupe et les normes
  source_statement: 'Les valeurs partagées créent la cohésion de groupe et établissent
    des normes. Le système de valeurs collectives évolue par interaction, décrit par
    un modèle de type Kuramoto pour des oscillateurs axiologiques :

    \[

    \frac{d\theta_i}{dt} = \omega_i + \frac{K}{N}\sum_{j=1}^N \sin(\theta_j - \theta_i)

    \]

    où $\theta_i$ représente la phase de l’orientation de valeur de chaque individu.'
