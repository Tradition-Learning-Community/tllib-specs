- provisional_object_id: TLC-SO-VALUES-003
  object_type: Invariant
  canonical_name: Propriétés essentielles
  source_name: Propriétés essentielles
  source_statement: '- **Invariance partielle** : le principe fondamental $\mathcal{P}$
    reste invariant sous petites perturbations contextuelles. C’est le noyau dur de
    la valeur.

    - **Métastabilité hiérarchique** : l’ordre $\mathcal{H}$ est stable contre des
    perturbations modérées ; il existe un rayon $R>0$ tel que si $\|\delta\mathcal{H}\|<R$,
    l’ordre relatif $\preceq$ est inchangé.

    - **Alignement motivationnel** : l’orientation $\mathcal{O}$ pointe dans la direction
    du gradient motivationnel croissant : $\langle \mathcal{O}, \nabla\mathcal{M}
    \rangle > 0$ quand la valeur est activée.

    - **Adaptabilité contextuelle** : le poids décisionnel $\mathcal{W}$ s’ajuste
    au contexte tout en préservant le noyau $\mathcal{P}$.

    - **Croissance intégrative** : l’intégration identitaire $\mathcal{I}$ augmente
    avec la pratique et la réflexion, tendant asymptotiquement vers 1 pour un Disciple
    engagé.'
  concise_description: Objet scientifique explicitement présenté comme « Propriétés
    essentielles » dans la source.
