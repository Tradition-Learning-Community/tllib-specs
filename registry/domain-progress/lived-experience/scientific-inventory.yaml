  source_statement: '- **Encodage sensori‑moteur** $\mathcal{E}_{\mathrm{sens}} : \mathcal{S} \times \mathcal{A}
    \times \mathbb{R}^+ \to \mathbb{LE}$.

    - **Encodage narratif** $\mathcal{E}_{\mathrm{nar}} : \mathbb{LE} \times \mathcal{E}_{\mathrm{mot}} \to \mathcal{N}$.

    - **Consolidation** $\mathcal{C}_{\mathrm{cons}} : \mathbb{LE} \times \mathbb{R}^+ \to \mathbb{LE}$ via l’équation
    différentielle stochastique.

    - **Rappel** $\mathcal{R}_{\mathrm{cal}} : \mathbb{LE} \times \mathcal{Q} \to \mathcal{H}$ avec attention softmax.

    - **Transmission expérientielle** $\mathcal{T}_{\mathrm{exp}} : \mathbb{LE}_{\mathcal{M}} \times \mathbb{LE}_{\mathcal{D}}
    \times \mathcal{C} \times \mathbb{R}^+ \to \mathbb{LE}_{\mathcal{D}}''$.'
