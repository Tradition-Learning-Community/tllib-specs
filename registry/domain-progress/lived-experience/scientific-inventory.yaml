    start_line: 22
    end_line: 28
  source_statement: '- **Synthèse temporelle** : il existe une fonction de synthèse $\Sigma : \mathbb{LE} \to \mathbb{LE}$
    qui extrait une structure invariante (le « noyau expérientiel ») de la séquence brute.

    - **Intégration holistique** : l’interprétation $\mathcal{H}$ combine les dimensions cognitive, affective, éthique
    et corporelle en un tout unifié.

    - **Source de légitimité** : la légitimité $\mathcal{L}_{\mathrm{leg}}$ d’un agent est une fonction croissante
    de la richesse de son expérience, mesurée par une norme $\|\ell\|_{\mathrm{LE}}$.

    - **Mémoire vivante** : l’expérience est dynamique ; elle s’enrichit de nouveaux événements et se transforme
    par des processus de consolidation et de réinterprétation.

    - **Incorporation** : l’expérience est encodée dans la mémoire sensori‑motrice, la rendant résistante à l’oubli
    et accessible sous stress.'
  symbols:
