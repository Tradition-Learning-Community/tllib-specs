    end_line: 156
  source_statement: '- $\mathcal{T}$ : espace des fonctions continues par morceaux de $[0,T]$ vers $\mathcal{S}
    \times \mathcal{A}$, avec norme $L^2$.

    - $\mathcal{H}$ : espace de Hilbert de dimension finie (par exemple $\mathbb{R}^d$) représentant les dimensions
    sémantiques.

    - $\mathbb{LE} = \mathcal{T} \times \mathcal{H}$ avec norme $\|\ell\|^2 = \|\ell_{\mathcal{T}}\|^2 + \|\ell_{\mathcal{H}}\|^2$.

    - $\mathcal{N}$ : espace de Hilbert des récits (séquences de symboles).

    - $\mathcal{E}_{\mathrm{mot}}$ : espace des émotions (par exemple les dimensions de Plutchik).'
  symbols:
