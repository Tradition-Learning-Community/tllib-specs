  source_statement: Observation silencieuse prolongée du Maître et de l’environnement vivant. Le Disciple « absorbe »
    les postures, les rythmes, les valeurs implicites sans action directe. Cette phase passive mais hautement structurante
    pose les fondements de l’ethos de la tradition et de la connaissance tacite (Lave & Wenger, 1991).
