- provisional_object_id: TLC-SO-PRACTICE-005
  object_type: Concept
  canonical_name: Domaines de validité
  source_name: Domaines de validité
  source_statement: '\[

    \mathcal{U}_{\mathcal{P}} = \{ (d,t,c,\mathcal{CP}) \in \mathcal{D} \times \mathbb{R}^+
    \times \mathcal{C} \times \mathcal{CP} \mid \mathcal{R}_{\mathrm{aff}}(d,c) >
    \rho_{\min},\ t > t_{\min},\ \mathcal{CP}\ \text{adéquat} \}

    \]

    où $\mathcal{R}_{\mathrm{aff}}$ est l’affinité Disciple‑contexte, et $\mathcal{CP}$
    adéquat signifie que le cadre fournit des défis et ressources appropriés.'
