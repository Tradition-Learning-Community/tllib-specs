  object_type: Concept
  canonical_name: Pratique (Practice)
  source_name: Pratique (Practice)
  source_statement: Dans le cadre de Tradition Learning (TL), la **Pratique** constitue
    l’ensemble des actions répétées, situées et intentionnelles par lesquelles les
    connaissances, les valeurs et les capacités sont incarnées, consolidées et transformées
    en compétences observables et transmissibles. Elle est le cœur opérationnel de
    la transmission, le pont indispensable entre le monde intérieur des valeurs, des
    principes et des capacités, et le monde extérieur de l’action efficace et de la
    compétence reconnue.
  concise_description: Objet scientifique explicitement présenté comme « Pratique
