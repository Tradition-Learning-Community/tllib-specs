- provisional_object_id: TLC-SO-PRACTICE-003
  object_type: Concept
  canonical_name: Propriétés essentielles
  source_name: Propriétés essentielles
  source_statement: '- **Incarnation** : la pratique engage le corps, les sens, tout
    l’être. Elle transforme des principes abstraits en gestes, routines et postures.

    - **Situativité** : elle prend place dans un cadre pratique concret $\mathcal{CP}$,
    avec ses lieux, ses ressources, ses défis et son contexte social.

    - **Intentionnalité** : elle n’est pas une simple activité, mais une répétition
    guidée visant la transformation et la maîtrise.

    - **Répétition et cyclicité** : la répétition est la clé de l’incorporation ;
    elle suit des cycles d’imprégnation, d’imitation, d’autonomie et de transmission.

    - **Socialité** : elle se déroule sous le regard du Maître, en interaction avec
    les pairs, et est validée par la communauté.

    - **Pouvoir transformateur** : elle convertit la capacité latente $\mathcal{C}_p$
    en compétence actualisée $\mathcal{C}_a$.'
  concise_description: Objet scientifique explicitement présenté comme « Propriétés
    essentielles » dans la source.
