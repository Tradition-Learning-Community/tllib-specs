  explicit_definition: '- **Compréhension accélérée** : un petit nombre de Principes bien choisis génèrent une compréhension
    sur un large éventail de discours.

    - **Généralisation robuste** : les Messages basés sur des Principes maintiennent leur cohérence et applicabilité
    dans des domaines éloignés du contexte d’apprentissage initial.

    - **Fidélité adaptative** : le système préserve les invariants essentiels de la tradition tout en permettant
    une adaptation contextuelle.

    - **Profondeur progressive** : les mêmes Principes continuent de produire des insights plus profonds lors d’engagements
    répétés, soutenant un apprentissage tout au long de la vie.'
