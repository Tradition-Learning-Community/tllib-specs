    start_line: 33
    end_line: 40
  explicit_definition: '- **Niveau 1 – Abstrait‑relationnel** : $F_P$ reste un symbole non interprété, $\succ_P$
    est une relation abstraite. Utile pour l’analyse philosophique (propriétés logiques : réflexivité, transitivité,
    composition).

    - **Niveau 2 – Ensembliste** : $F_P$ est défini comme un ensemble de contraintes, de règles ou de motifs autorisés.
    La relation est modélisée par une prédicat $\Phi_P(D,M)$ :

    \[

    D \succ_P M \iff M \in \{ M'' \mid \Phi_P(D,M'') \}.

    \]

    - **Niveau 3 – Calculable** : $F_P$ est un objet calculable (vecteur, couche de réseau de neurones, programme
    symbolique). $\succ_P$ devient une fonction ou une application stochastique, implémentable en IA.'
  symbols:
  - F_P
  - \succ_P
  - \Phi_P(D,M)
  - \Phi_P(D,M')
  dependencies: []
  related_objects: []
  status: candidate
  ambiguity: false
  unresolved_ids: []
  non_invention_note: Canonical extraction preserved; no semantics added.
