  explicit_definition: 'Chaque Principe $P$ établit un ensemble de contraintes génératives qui délimitent l’espace
    des Messages possibles :

    \[

    \mathcal{M}_P = \{ M \mid \exists D\in\mathcal{D}_P : D \succ_P M \}.

    \]

    La tâche de l’apprenant est de découvrir des Messages $M$ satisfaisant ces contraintes tout en restant fidèles
    aux discours reçus.'
