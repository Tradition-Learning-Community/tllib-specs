  explicit_definition: Dans le cadre de Tradition Learning (TL), un **Principe** est un élément conceptuel stable
    et structurant qui guide l’interprétation, l’orientation et l’action. Il ne dérive pas d’une collection de discours
    (instances de données) mais fournit un échafaudage de haut niveau pour leur compréhension. C’est une loi invariante
    ou une contrainte générative qui gouverne l’interprétation, l’organisation et la génération de sens au sein
    d’un système d’apprentissage.
