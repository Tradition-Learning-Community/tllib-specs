  explicit_definition: 'Deux Principes peuvent être combinés. Si $P_1$ et $P_2$ sont des Principes, leur composition
    $P_1\circ P_2$ est définie par :

    \[

    D_{P_1\circ P_2} = D_{P_1}\cap D_{P_2},\quad D \succ_{P_1\circ P_2} M \iff \exists M'' : D \succ_{P_1} M'' \text{
    et } M'' \succ_{P_2} M.

    \]'
