  source_statement: '**Axiome 1 – Actualisation contextuelle** : pour tout système de capacités $\mathcal{C}_p$
    et contexte $\mathcal{X}$, il existe un opérateur d’actualisation $\mathcal{A}$ tel que :

    \[

    \lim_{t\to\infty} \mu\big( \mathcal{T}^t(\mathcal{C}_p,\mathcal{X}) \cap \mathcal{C}_a \big) = \mu(\mathcal{C}_p)
    \cdot \Gamma(\mathcal{X})

    \]

    où $\Gamma(\mathcal{X})$ est l’adéquation contextuelle (Vygotsky, 1978).'
