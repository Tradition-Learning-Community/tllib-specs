  source_statement: 'La pratique délibérée transforme la capacité latente en compétence démontrable :

    \[

    \frac{d\mathcal{C}_a}{dt} = \alpha \cdot \mathcal{P}(t) \cdot (1 - \mathcal{C}_a / \mathcal{C}_{\max}) + \beta
    \cdot \mathcal{G}(t) \cdot (\mathcal{C}_p - \mathcal{C}_a)

    \]

    où $\mathcal{P}(t)$ est l’intensité de pratique, $\mathcal{G}(t)$ la qualité du guidage (Ericsson, Krampe &
    Tesch‑Römer, 1993).'
