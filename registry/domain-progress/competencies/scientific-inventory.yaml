    start_line: 295
    end_line: 305
  source_statement: 'Le système couplé pour les compétences, les capacités et les vertus :

    \[

    \begin{cases}

    \displaystyle\frac{d\mathcal{C}_a}{dt} = \mathbf{A}(t)\cdot\mathcal{C}_a\cdot(\mathbf{1}-\mathcal{C}_a) + \mathbf{B}\cdot\mathcal{C}_p
    + \mathbf{\Gamma}(t)\cdot\mathcal{V} + \mathbf{\Delta}\cdot\nabla_{\mathcal{C}_a}\Phi + \mathbf{\Sigma}(t)\epsilon(t)\\[1.5em]

    \displaystyle\frac{d\mathcal{C}_p}{dt} = \mathbf{M}_p(t)\cdot\mathcal{C}_a\cdot(\mathcal{C}_{p,\max}-\mathcal{C}_p)
    + \mathbf{N}_p(t)\cdot\mathcal{V}\cdot\mathcal{C}_p + \mathbf{O}_p\cdot\nabla_{\mathcal{C}_p}\Psi + \mathbf{\Xi}_p(t)\eta(t)\\[1.5em]

    \displaystyle\frac{d\mathcal{V}}{dt} = \mathbf{K}_v(t)\cdot\mathcal{C}_a\cdot(\mathcal{V}_{\max}-\mathcal{V})
    + \mathbf{L}_v(t)\cdot\mathcal{C}_p\cdot\mathcal{V} + \mathbf{M}_v\cdot\nabla_{\mathcal{V}}\Omega + \mathbf{N}_v(t)\zeta(t)

    \end{cases}

    \]

    où les matrices $\mathbf{A},\mathbf{B},\mathbf{\Gamma},\ldots$ sont adaptatives (dépendent du temps et du contexte).'
