  source_statement: '- $\mathcal{C}_a$ est une variété hilbertienne de dimension finie (chaque composante est euclidienne).

    - La métrique $g_a$ est définie par :

    \[

    g_a(u,v) = \langle u,v \rangle_{\mathcal{C}_a} + \alpha R_{\mathcal{C}_a}(u,v) + \beta \Phi(\mathcal{I}(u),\mathcal{I}(v))

    \]

    où $R_{\mathcal{C}_a}$ est la courbure sectionnelle (mesurant la difficulté de combiner des compétences), et
    $\Phi$ mesure la compatibilité entre les intégrations identitaires associées.

