  - \mathcal{C}_a
  - \mathbb{E}[\mathcal{C}_{\mathrm{tech}} \cdot \mathcal{C}_{\mathrm{cog}}] > 0
  - \dim(\mathcal{C}_a(t)) \le D_{\max}
