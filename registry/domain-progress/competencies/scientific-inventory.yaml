    subsection: null
    start_line: 35
    end_line: 42
  source_statement: '- **Actualisation** : $\mathcal{C}_a \subset \mathcal{C}_p$ et $\mu(\mathcal{C}_a) > 0$. La
    compétence occupe une partie mesurable de l’espace des capacités.

    - **Contextualisation** : pour tout contexte $c \in \mathcal{X}$, il existe un opérateur de restriction $\rho_c
    : \mathcal{C}_a \to \mathcal{C}_a(c)$ tel que $\|\rho_c\| \le 1$ et $\rho_c$ est une isométrie sur son image.
    La compétence s’exprime différemment selon le contexte sans perdre sa structure.

    - **Intégration** : les composantes de $\mathcal{C}_a$ sont liées par des relations de covariance : $\mathbb{E}[\mathcal{C}_{\mathrm{tech}}
    \cdot \mathcal{C}_{\mathrm{cog}}] > 0$. Une solide compétence technique est généralement associée à une bonne
    compréhension cognitive.

    - **Évolutivité** : la dimension de $\mathcal{C}_a$ peut croître par innovation mais reste bornée : $\dim(\mathcal{C}_a(t))
    \le D_{\max}$.

    - **Démontrabilité** : une compétence doit être observable et démontrable dans l’action pour être reconnue.

    - **Validité** : la compétence est confirmée par la démonstration et la reconnaissance sociale (Maître, pairs,
    communauté).'
  symbols:
