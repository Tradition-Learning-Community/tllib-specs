    end_line: 286
  source_statement: '**Théorème 1 (Convergence de l’actualisation contextuelle)**

    Soit $\{\mathcal{C}_{a,n}\}$ une séquence de compétences obtenues par actualisation sous guidage optimal dans
    des contextes $\{\mathcal{X}_n\}$ convergeant vers $\mathcal{X}^*$. Si (1) le Maître est adaptatif, (2) la pratique
    est suffisante, et (3) $\mathcal{A}$ est contractif en moyenne, alors :

    \[

    \lim_{n\to\infty} \mathbb{P}\left( \frac{\mu(\mathcal{C}_{a,n})}{\mu(\mathcal{C}_{p,n})} \cdot \Gamma(\mathcal{X}_n)
    > 1 - \epsilon \right) = 1

    \]'
