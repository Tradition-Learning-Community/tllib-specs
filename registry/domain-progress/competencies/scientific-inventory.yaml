  source_statement: Dans le cadre de Tradition Learning (TL), les **Compétences** représentent l’actualisation et
    la démonstration concrète des capacités latentes du Disciple. Si les Capacités sont le potentiel brut, la promesse,
    les Compétences sont l’acte, la preuve tangible que la transmission a opéré. Une compétence est un savoir‑faire
    opérationnel, une maîtrise technique, un outil que le Disciple apprend à manipuler avec efficacité, précision
    et adaptabilité.
